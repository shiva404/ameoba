syntax = "proto3";

package ameoba.v1;

option python_package = "ameoba.api.grpc.generated.ameoba.v1";

// IngestService: accepts DataRecord payloads from agents.
service IngestService {
  // Ingest a single record.
  rpc IngestOne(IngestRequest) returns (IngestResponse);

  // Stream many records in, stream responses back.
  rpc IngestStream(stream IngestRequest) returns (stream IngestResponse);
}

message IngestRequest {
  string collection = 1;
  bytes  payload_json = 2;   // JSON-encoded payload
  string content_type = 3;
  string category_hint = 4;  // Optional: relational|document|graph|blob|vector
  string lifecycle = 5;      // raw|intermediate|final
  string tenant_id = 6;
  string agent_id = 7;
  string session_id = 8;
}

message IngestResponse {
  string record_id = 1;
  string category = 2;
  double confidence = 3;
  repeated string backend_ids = 4;
  int64  audit_sequence = 5;
  string error = 6;  // Non-empty on partial failure
}
